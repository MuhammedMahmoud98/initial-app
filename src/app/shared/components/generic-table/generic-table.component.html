<p-table
  [columns]="columns()"
  [value]="items()"
  [scrollHeight]="'flex'"
  [selection]="selectedLocations"
  (selectionChange)="onSelectionChange($event)"
  (onPage)="onPageChange($event)"
  [rows]="rowsCounter"
  [rowTrackBy]="trackByCode"
  [totalRecords]="totalRecords()"
  [paginator]=" showRecordInfo() ? showRecordInfo() : totalRecords() > 50"
  [lazy]="true"
  [(first)]="first"
  [showCurrentPageReport]="true"
  [currentPageReportTemplate]="`paginationReport` | translate:{itemsLength: paginationIndex(), totalRecords: '{totalRecords}'}"
  (onHeaderCheckboxToggle)="onMainCheckboxChanged($event)"
  dataKey="id"
  [styleClass]="showRecordInfo() ? 'show-reports-only' : ''"
>
  <ng-template #header let-columns>
    <tr>
      <!-- TABLE HEADER CHECKBOX -->
      @if (hasCheckBoxes()) {
        <th>
          <p-tableHeaderCheckbox />
        </th>
      }

      @for (col of columns; track col?.field || col?.alias || $index) {
        <th [style.width]="col?.columnWidth + '!important'">
          {{ (col.alias ?? col.field) | translate }}
        </th>
      }
    </tr>
  </ng-template>
  <ng-template #body let-rowData let-columns="columns">
    <tr (click)="onRowClickGuard($event, rowData)">
      <!-- TABLE BODY CHECKBOX -->
      @if (hasCheckBoxes()) {
        <td (click)="$event.stopPropagation()">
          <p-tableCheckbox [value]="rowData" />
        </td>
      }

      @for (col of columns; track col?.field || col?.alias || $index) {
        @if (col?.template) {
          <td>
            <ng-container *ngTemplateOutlet="col.template; context: {$implicit: rowData}"/>
          </td>
        } @else {
          <td>{{rowData[col?.field]}}</td>
        }
      }
    </tr>
  </ng-template>
</p-table>
